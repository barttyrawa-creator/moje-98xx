<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>98XX - THE BOARD</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; font-family: 'Courier New', Courier, monospace; color: #fff; }
        canvas { display: block; }

        /* --- UI OVERLAYS --- */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .win98-window {
            position: absolute; background: #c0c0c0; border: 2px solid; border-color: #dfdfdf #808080 #808080 #dfdfdf;
            padding: 2px; box-shadow: 2px 2px 0 #000; pointer-events: auto;
        }
        .title-bar { background: #000080; color: white; padding: 3px 5px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .window-content { padding: 10px; color: #000; }
        button { background: #c0c0c0; border: 2px solid; border-color: #dfdfdf #808080 #808080 #dfdfdf; cursor: pointer; padding: 3px 10px; }
        button:active { border-color: #808080 #dfdfdf #dfdfdf #808080; }

        /* --- BOOT SEQUENCE --- */
        #boot-screen { position: absolute; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .bios-text { width: 80%; color: #0f0; font-size: 14px; text-align: left; }

        /* --- DESKTOP --- */
        #desktop { width: 100%; height: calc(100% - 30px); position: relative; display: none; background: #008080; }
        .icon { position: absolute; width: 64px; height: 80px; text-align: center; cursor: pointer; pointer-events: auto; }
        .icon img { width: 32px; height: 32px; background: #c0c0c0; display: block; margin: 0 auto 5px; border: 2px solid #fff; }
        .icon span { background: #000080; color: #fff; font-size: 12px; padding: 1px 2px; }

        #taskbar { position: absolute; bottom: 0; width: 100%; height: 30px; background: #c0c0c0; border-top: 2px solid #fff; display: none; z-index: 500; align-items: center; padding: 0 5px; box-sizing: border-box; }
        .start-btn { font-weight: bold; display: flex; align-items: center; gap: 5px; border: 2px solid; border-color: #dfdfdf #808080 #808080 #dfdfdf; padding: 2px 10px; height: 22px; cursor: pointer; color: #000; }

        /* --- CRT OVERLAY --- */
        #crt { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10000;
               background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
               background-size: 100% 4px, 3px 100%; opacity: 0.4; }

        /* --- STATS --- */
        #stats { position: absolute; top: 5px; right: 5px; color: #fff; z-index: 1000; text-shadow: 1px 1px #000; font-weight: bold; }
    </style>
</head>
<body>
    <div id="crt"></div>
    <div id="stats">RUNES: 0/3</div>

    <!-- BOOT SCREEN -->
    <div id="boot-screen">
        <div class="bios-text" id="bios-log"></div>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" style="display: none; position: absolute; width: 100%; height: 100%; background: #008080; z-index: 900; display: flex; justify-content: center; align-items: center;">
        <div class="win98-window" style="width: 300px;">
            <div class="title-bar"><span>LOG ON TO 98XX</span></div>
            <div class="window-content">
                <p>USERNAME: <b>GUEST</b></p>
                <p>PASSWORD: [********]</p>
                <button id="login-btn" style="width: 100%">OK</button>
            </div>
        </div>
    </div>

    <!-- DESKTOP -->
    <div id="desktop">
        <div class="icon" style="top: 20px; left: 20px;" onclick="launchGame('julian')">
            <img src=""><span>JULIAN.EXE</span>
        </div>
        <div class="icon" style="top: 120px; left: 20px;" onclick="launchGame('popper')">
            <img src=""><span>POPPER.EXE</span>
        </div>
        <div class="icon" style="top: 220px; left: 20px;" onclick="launchGame('quest')">
            <img src=""><span>QUEST.EXE</span>
        </div>
        <div class="icon" style="bottom: 50px; right: 20px;">
            <img style="background: #800000;"><span>BIN</span>
        </div>
    </div>

    <div id="taskbar">
        <div class="start-btn">Start</div>
        <div style="flex-grow: 1;"></div>
        <div id="clock" style="color: #000; border: 1px inset #fff; padding: 2px 5px; font-size: 12px;">12:00 PM</div>
    </div>

    <!-- GAME OVER / GLITCH BOX -->
    <div id="glitch-box" class="win98-window" style="display: none; width: 300px; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 2000;">
        <div class="title-bar"><span id="err-title">SYSTEM ERROR</span></div>
        <div class="window-content">
            <p id="err-msg">FATAL EXCEPTION AT 0x0098XX.</p>
            <button onclick="location.reload()">OK</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        const state = {
            runes: 0,
            currentGame: null,
            audioCtx: null,
            isGlitched: false,
            bonzoAggro: 0
        };

        // --- BOOT SEQUENCE ---
        const biosLines = [
            "98XX BIOS Ver 1.0.2",
            "Copyright (C) 1998 JacksonGameStudios",
            "CPU: Intel Pentium II 300MHz",
            "Memory Test: 64MB OK",
            "Detecting Primary Master ... OK",
            "Booting from C: ...",
            "Loading 98XX OS ...",
            "Starting system services ...",
            "Welcome to the Board."
        ];

        async function runBoot() {
            const log = document.getElementById('bios-log');
            for(let line of biosLines) {
                log.innerHTML += line + "<br>";
                await new Promise(r => setTimeout(r, 200 + Math.random() * 500));
            }
            setTimeout(() => {
                document.getElementById('boot-screen').style.display = 'none';
                document.getElementById('login-screen').style.display = 'flex';
            }, 1000);
        }

        document.getElementById('login-btn').onclick = () => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('desktop').style.display = 'block';
            document.getElementById('taskbar').style.display = 'flex';
            initAudio();
        };

        runBoot();

        // --- AUDIO ---
        function initAudio() {
            state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(freq, type, duration, vol=0.1) {
            if(!state.audioCtx) return;
            const osc = state.audioCtx.createOscillator();
            const gain = state.audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, state.audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, state.audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, state.audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(state.audioCtx.destination);
            osc.start();
            osc.stop(state.audioCtx.currentTime + duration);
        }

        // --- THREE.JS ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('desktop').appendChild(renderer.domElement);

        camera.position.z = 10;

        // --- MINI GAMES LOGIC ---
        window.launchGame = function(gameId) {
            if(state.currentGame) return;
            console.log("Launching:", gameId);
            state.currentGame = gameId;
            playSound(440, 'sine', 0.1);
            
            // Setup scene based on game
            if(gameId === 'julian') setupJulian();
            if(gameId === 'popper') setupPopper();
            if(gameId === 'quest') setupQuest();
        };

        function closeGame() {
            while(scene.children.length > 0){ 
                scene.remove(scene.children[0]); 
            }
            state.currentGame = null;
            playSound(220, 'sine', 0.1);
        }

        // --- GAME 1: JULIAN (Platformer) ---
        let player, platforms = [], rune;
        function setupJulian() {
            const ground = new THREE.Mesh(new THREE.BoxGeometry(20, 1, 1), new THREE.MeshPhongMaterial({color: 0x888888}));
            ground.position.y = -5;
            scene.add(ground);
            
            player = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshPhongMaterial({color: 0xffffff}));
            player.position.set(-8, -4, 0);
            scene.add(player);

            rune = new THREE.Mesh(new THREE.OctahedronGeometry(0.3), new THREE.MeshPhongMaterial({color: 0xff00ff, emissive: 0xff00ff}));
            rune.position.set(8, -4, 0);
            scene.add(rune);

            const light = new THREE.PointLight(0xffffff, 50);
            light.position.set(0, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));
        }

        // --- GAME 2: POPPER (Clicking) ---
        function setupPopper() {
            const light = new THREE.PointLight(0xffffff, 100);
            light.position.set(0, 0, 10);
            scene.add(light);

            for(let i=0; i<10; i++) {
                const ball = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshPhongMaterial({color: Math.random() * 0xffffff}));
                ball.position.set((Math.random()-0.5)*10, (Math.random()-0.5)*10, 0);
                ball.userData.clickable = true;
                scene.add(ball);
            }
        }

        // --- INPUT & LOOP ---
        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        function animate() {
            requestAnimationFrame(animate);

            if(state.currentGame === 'julian') {
                if(keys['KeyA']) player.position.x -= 0.1;
                if(keys['KeyD']) player.position.x += 0.1;
                
                if(player.position.distanceTo(rune.position) < 1) {
                    collectRune();
                    closeGame();
                }
            }

            if(state.isGlitched) {
                renderer.setClearColor(Math.random() > 0.9 ? 0xff0000 : 0x008080);
            } else {
                renderer.setClearColor(0x008080);
            }

            renderer.render(scene, camera);
        }
        animate();

        function collectRune() {
            state.runes++;
            document.getElementById('stats').innerText = `RUNES: ${state.runes}/3`;
            playSound(880, 'square', 0.5);
            glitchEffect();
        }

        function glitchEffect() {
            state.isGlitched = true;
            setTimeout(() => state.isGlitched = false, 500);
            state.bonzoAggro += 1;
            if(state.bonzoAggro > 2) triggerBonzo();
        }

        function triggerBonzo() {
            document.getElementById('glitch-box').style.display = 'block';
            document.getElementById('err-title').innerText = "FATAL: BONZOBANY";
            document.getElementById('err-msg').innerText = "THE RABBIT IS IN THE SYSTEM. REBOOT IMMEDIATELY.";
            playSound(50, 'sawtooth', 2, 0.5);
        }

        // Clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }, 1000);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
